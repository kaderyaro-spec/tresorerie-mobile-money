name: Build APK Android

# Compile l'application Android Warri dans le cloud (serveurs GitHub) et publie
# l'APK en "artifact" telechargeable. Aucun outil a installer sur ton PC.
on:
  push:
    paths:
      - 'warri-android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:      # bouton "Run workflow" pour relancer a la demande

permissions:
  contents: write        # necessaire pour publier la Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Preparer Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compiler l'APK (debug)
        working-directory: warri-android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Publier l'APK (artifact, pour les connectes GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: warri-apk
          path: warri-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publier l'APK en Release (lien public permanent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create apk --title "APK Warri (derniere version)" \
            --notes "Application Android Warri a installer sur les telephones agents." || true
          gh release upload apk \
            warri-android/app/build/outputs/apk/debug/app-debug.apk --clobber
