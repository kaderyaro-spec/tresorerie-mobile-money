# Configuration de déploiement Render (Blueprint).
# Render lit ce fichier automatiquement et configure le service.
services:
  - type: web
    name: tresorerie-mobile-money
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render génère une clé secrète sûre
      - key: PYTHON_VERSION
        value: "3.12.7"
